<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeAgent — Page not found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#F8F9FC;color:#0D0F1A;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
    .wrap{text-align:center;max-width:380px;padding:32px;animation:fadeUp .5s cubic-bezier(0.34,1.56,0.64,1) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .icon{width:64px;height:64px;border-radius:18px;background:rgba(37,99,235,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 4px 16px rgba(37,99,235,0.10);animation:bounceIn .6s cubic-bezier(0.34,1.56,0.64,1) .1s both}
    @keyframes bounceIn{0%{opacity:0;transform:scale(0.7)}60%{opacity:1;transform:scale(1.08)}100%{transform:scale(1)}}
    .icon svg{width:30px;height:30px;color:#2563EB}
    h1{font-size:22px;font-weight:700;margin-bottom:8px}
    p{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:28px}
    a{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:10px;background:#111827;color:#fff;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 2px 10px rgba(17,24,39,0.2);transition:all .2s cubic-bezier(0.34,1.56,0.64,1)}
    a:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 6px 18px rgba(17,24,39,0.25)}
    a svg{width:14px;height:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <h1>Page not found</h1>
    <p>The agent couldn't locate that page. It may have moved or never existed.</p>
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to HomeAgent
    </a>
  </div>
</body>
</html>
