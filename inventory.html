<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeAgent — Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .search-wrap{position:relative;flex:1;min-width:200px}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none}
    .search-input{width:100%;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:all .2s;box-shadow:var(--shadow-sm)}
    .search-input::placeholder{color:var(--muted)}
    .search-input:focus{border-color:rgba(232,237,245,.4)}
    .filter-btn{padding:7px 13px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s cubic-bezier(0.34,1.56,0.64,1);border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--font);box-shadow:var(--shadow-sm)}
    .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(17,24,39,.18)}
    .filter-btn:hover:not(.active){background:var(--surface2);color:var(--text);border-color:var(--border-strong)}
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(17,24,39,.08)}
    .add-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius);background:#2563EB;color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);box-shadow:0 2px 8px rgba(37,99,235,.35);transition:all .2s cubic-bezier(0.34,1.56,0.64,1)}
    .add-btn:hover{background:#1D4ED8;transform:translateY(-2px) scale(1.03);box-shadow:0 6px 18px rgba(37,99,235,.4)}
    .add-btn:active{transform:scale(.97)}
    .add-btn svg{width:15px;height:15px}
    .inv-table{width:100%;border-collapse:collapse}
    .inv-table th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    .inv-table td{padding:11px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
    .inv-table tr:last-child td{border-bottom:none}
    .inv-table tr:hover td{background:var(--surface2)}
    .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot-critical{background:var(--danger)}
    .dot-low{background:var(--warn)}
    .dot-ok{background:var(--success)}
    .item-cell{display:flex;align-items:center;gap:9px}
    .cat-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);white-space:nowrap}
    .action-btn{padding:5px 12px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--font);transition:all .2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:var(--shadow-sm)}
    .action-btn:hover{background:#2563EB;color:#fff;border-color:#2563EB;transform:translateY(-1px) scale(1.05);box-shadow:0 4px 10px rgba(37,99,235,.25)}
    .item-icon-cell{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-sm);transition:transform .2s cubic-bezier(0.34,1.56,0.64,1)}
    .item-icon-cell svg{width:14px;height:14px}
    .inv-table tr:hover .item-icon-cell{transform:scale(1.15) rotate(-4deg)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:modalPop .3s cubic-bezier(0.34,1.56,0.64,1)}
    @keyframes modalPop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:20px;color:var(--text)}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}
    .field input,.field select{width:100%;padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s}
    .field input:focus,.field select:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1);background:var(--surface)}
    select option{background:var(--surface)}
    .modal-btns{display:flex;gap:8px;margin-top:20px}
    .loading-row{text-align:center;padding:48px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
<div class="app-shell">
  <main class="main-content">
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" placeholder="Search items…"/>
      </div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
      <button class="filter-btn" data-filter="critical" onclick="setFilter(this)">Critical</button>
      <button class="filter-btn" data-filter="low" onclick="setFilter(this)">Low stock</button>
      <button class="filter-btn" data-filter="ok" onclick="setFilter(this)">OK</button>
      <button class="add-btn" onclick="openAddModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add item
      </button>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="inv-table">
        <thead>
          <tr>
            <th>Item</th><th>Category</th><th>Stock level</th>
            <th>Days left</th><th>Weekly use</th><th>Last purchased</th><th></th>
          </tr>
        </thead>
        <tbody id="inv-body">
          <tr><td colspan="7"><div class="loading-row">Loading inventory…</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Add Item Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Add inventory item</div>
    <div class="field"><label>Item name</label><input id="new-name" placeholder="e.g. Basmati rice"/></div>
    <div class="field">
      <label>Category</label>
      <select id="new-cat">
        <option>Dairy</option><option>Pantry</option><option>Vegetables</option>
        <option>Spices</option><option>Bakery</option><option>Cleaning</option>
        <option>Beverages</option><option>Meat</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Current stock (%)</label><input id="new-stock" type="number" min="0" max="100" value="80"/></div>
    <div class="field"><label>Weekly usage (units)</label><input id="new-usage" type="number" min="0.1" step="0.1" value="1"/></div>
    <div class="field"><label>Estimated price (₹)</label><input id="new-price" type="number" min="1" value="100"/></div>
    <div class="field"><label>Preferred brand</label><input id="new-brand" placeholder="e.g. Amul"/></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveItem()">Add item</button>
    </div>
  </div>
</div>

<script type="module">
import { initAuthGuard, signOutUser, auth } from "./js/auth.js";
import { renderShell } from "./js/shell.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, addDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { db } from "./js/firebase-config.js";
import { addProductToCart } from "./js/agents/cartHelper.js";

import { initAllAnimations } from "./js/animations.js";
  renderShell("inventory", "Inventory");
initAuthGuard(true);
  initAllAnimations();
document.getElementById("signout-btn").addEventListener("click", signOutUser);

let userId = null;
let allItems = [];

// ── Icon + color map for item categories ───────────────────
const categoryIcons = {
  Dairy:      { color:"#2563EB", bg:"rgba(37,99,235,0.10)",  svg:'<path d="M8 2h8M9 2v4l-3 4v10a2 2 0 002 2h8a2 2 0 002-2V10l-3-4V2"/>' },
  Pantry:     { color:"#D97706", bg:"rgba(217,119,6,0.10)",  svg:'<path d="M3 3h18v18H3z"/><path d="M3 9h18"/>' },
  Vegetables: { color:"#16A34A", bg:"rgba(22,163,74,0.10)",  svg:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v8"/>' },
  Spices:     { color:"#DC2626", bg:"rgba(220,38,38,0.10)",  svg:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>' },
  Bakery:     { color:"#D97706", bg:"rgba(217,119,6,0.10)",  svg:'<rect x="3" y="9" width="18" height="11" rx="2"/><path d="M7 9V6a5 5 0 0110 0v3"/>' },
  Cleaning:   { color:"#7C3AED", bg:"rgba(124,58,237,0.10)", svg:'<path d="M3 3l18 18M9 3v6m6-6v6M3 9h18"/>' },
  Beverages:  { color:"#92400E", bg:"rgba(146,64,14,0.10)",  svg:'<path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>' },
  Meat:       { color:"#B91C1C", bg:"rgba(185,28,28,0.10)",  svg:'<path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z"/>' },
  Other:      { color:"#6B7280", bg:"rgba(107,114,128,0.10)",svg:'<circle cx="12" cy="12" r="9"/>' },
};
function categoryIcon(category) {
  const c = categoryIcons[category] || categoryIcons.Other;
  return `<div class="item-icon-cell" style="background:${c.bg}"><svg viewBox="0 0 24 24" fill="none" stroke="${c.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${c.svg}</svg></div>`;
}
let currentFilter = "all";
let searchQuery = "";

onAuthStateChanged(auth, async user => {
  if (!user) return;
  userId = user.uid;
  await loadInventory();
});

async function loadInventory() {
  const snap = await getDocs(collection(db, "users", userId, "inventory"));
  allItems   = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => a.stockPct - b.stockPct);
  renderTable();
}

function renderTable() {
  const filtered = allItems.filter(item => {
    const matchFilter = currentFilter === "all" || item.status === currentFilter;
    const matchSearch = item.name.toLowerCase().includes(searchQuery) ||
                        (item.category || "").toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });

  const counts = {
    all: allItems.length,
    critical: allItems.filter(i => i.status === "critical").length,
    low: allItems.filter(i => i.status === "low").length,
    ok: allItems.filter(i => i.status === "ok").length,
  };

  document.querySelectorAll(".filter-btn").forEach(btn => {
    const f = btn.dataset.filter;
    btn.textContent = `${f.charAt(0).toUpperCase() + f.slice(1)}${counts[f] !== undefined ? ` (${counts[f]})` : ""}`;
  });

  const statusDotClass = { critical:"dot-critical", low:"dot-low", ok:"dot-ok" };
  const stockClass     = { critical:"stock-critical", low:"stock-low", ok:"stock-ok" };
  const badgeClass     = { critical:"badge-danger", low:"badge-warn", ok:"badge-success" };

  if (!filtered.length) {
    document.getElementById("inv-body").innerHTML =
      `<tr><td colspan="7"><div class="loading-row">No items match.</div></td></tr>`;
    return;
  }

  document.getElementById("inv-body").innerHTML = filtered.map(item => `
    <tr>
      <td>
        <div class="item-cell">
          ${categoryIcon(item.category || "Other")}
          <span style="font-weight:600">${item.name}</span>
          <span class="status-dot ${statusDotClass[item.status] || "dot-ok"}" title="${item.status}" style="margin-left:2px"></span>
        </div>
      </td>
      <td><span class="cat-tag">${item.category || "Other"}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="stock-bar" style="width:90px;margin:0">
            <div class="stock-fill ${stockClass[item.status] || "stock-ok"}" style="width:${item.stockPct}%"></div>
          </div>
          <span style="font-size:12px;color:var(--muted)">${item.stockPct}%</span>
        </div>
      </td>
      <td style="font-size:12px;color:var(--muted)">${item.daysLeft ?? "—"} days</td>
      <td style="font-size:12px;color:var(--muted)">${item.weeklyUsage ?? "—"}</td>
      <td style="font-size:12px;color:var(--muted)">${item.lastDelivered ? "Recent" : "—"}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="action-btn" onclick="addToCart('${item.id}')" title="Add to cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px;vertical-align:-2px"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          </button>
          <button class="action-btn" onclick="editItem('${item.id}')">Edit</button>
        </div>
      </td>
    </tr>`).join("");
}

window.setFilter = (btn) => {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = btn.dataset.filter;
  renderTable();
};

document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase();
  renderTable();
});

window.openAddModal = () => document.getElementById("modal").style.display = "flex";
window.closeModal   = () => document.getElementById("modal").style.display = "none";

window.saveItem = async () => {
  const name     = document.getElementById("new-name").value.trim();
  if (!name) { showToast("Enter an item name", "error"); return; }
  const stockPct = parseInt(document.getElementById("new-stock").value) || 80;
  const status   = stockPct <= 10 ? "critical" : stockPct <= 20 ? "low" : "ok";
  await addDoc(collection(db, "users", userId, "inventory"), {
    name,
    category:       document.getElementById("new-cat").value,
    stockPct,
    status,
    weeklyUsage:    parseFloat(document.getElementById("new-usage").value) || 1,
    estimatedPrice: parseInt(document.getElementById("new-price").value) || 100,
    preferredBrand: document.getElementById("new-brand").value,
    baseWeeklyUsage: parseFloat(document.getElementById("new-usage").value) || 1,
    pctPerUnit: 20,
    totalQuantity: 10,
    reorderQty: 1,
    daysLeft: Math.round(stockPct / (parseFloat(document.getElementById("new-usage").value) || 1) * 7 / 10),
    createdAt: serverTimestamp(),
  });
  closeModal();
  showToast(`${name} added ✓`, "success");
  await loadInventory();
};

window.editItem = (itemId) => showToast("Edit panel coming soon", "success");

window.addToCart = async (itemId) => {
  const item = allItems.find(i => i.id === itemId);
  if (!item) return;
  try {
    await addProductToCart(userId, {
      itemId:    item.id,
      name:      item.name,
      brand:     item.preferredBrand || "Best available",
      category:  item.category || "Other",
      unitPrice: item.estimatedPrice || item.lastPrice || 100,
    }, 1);
    showToast(`${item.name} added to cart ✓`, "success");
  } catch (err) {
    showToast("Could not add item: " + err.message, "error");
  }
};
</script>
</body>
</html>
